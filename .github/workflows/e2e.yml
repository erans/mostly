name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm -r --if-present run test

  e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test:e2e

  e2e-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker-compose.e2e.yml up --build --exit-code-from test-runner
      - name: Save server logs on failure
        if: failure()
        run: docker compose -f docker-compose.e2e.yml logs server > /tmp/mostly-e2e-server.log 2>&1
      - name: Upload server logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-server-logs
          path: /tmp/mostly-e2e-server.log
          retention-days: 7

  deploy-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats-core and shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y bats shellcheck
      - name: shellcheck the deploy script and helpers
        run: |
          shellcheck scripts/deploy-cloudflare.sh \
                     scripts/lib/deploy-cloudflare-utils.sh \
                     scripts/stubs/*
      - name: Run bats tests
        run: bats scripts/__tests__/
