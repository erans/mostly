services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Bootstrap-only: hashed and stored on first run, ignored if a token
      # already exists. Server-side name signals "this seeds the workspace".
      MOSTLY_BOOTSTRAP_AGENT_TOKEN: test-token-e2e
      MOSTLY_PORT: "6080"
      MOSTLY_DB_PATH: /data/mostly.db
      MOSTLY_BOOTSTRAP_ACTOR: e2e-agent
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6080/healthz"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 10s
    ports:
      - "6080:6080"

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      SERVER_URL: http://server:6080
      MOSTLY_SERVER_URL: http://server:6080
      # Client-side name matches the CLI's user-facing convention; the
      # bootstrap server installs the same value as a hashed agent token.
      MOSTLY_AGENT_TOKEN: test-token-e2e
      MOSTLY_ACTOR: e2e-agent
    depends_on:
      server:
        condition: service_healthy
    volumes:
      - type: tmpfs
        target: /tmp/mostly-test
